<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline</title>
<style>
  body { background: #1a1a2e; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: system-ui, sans-serif; }
  .container { text-align: center; }
  h1 { color: #16a085; }
  p { color: #aaa; }
  button { background: #16a085; border: none; color: #fff; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
  button:hover { background: #138871; }
</style>
</head>
<body>
  <div class="container">
    <h1>You're offline</h1>
    <p>Please check your internet connection</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
